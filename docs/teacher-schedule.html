<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="老師課表">
  <title>高手揪派｜老師課表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/teacher.css?v=202607081500">
  <link rel="stylesheet" href="css/line-id.css?v=202607081500">
</head>
<body>
  <script>
    (function () {
      var PAGE_VERSION = "202607081400";
      var versionKey = "gosu-teacher-page-version";

      try {
        if (localStorage.getItem(versionKey) !== PAGE_VERSION) {
          localStorage.setItem(versionKey, PAGE_VERSION);
          if (location.search.indexOf("v=" + PAGE_VERSION) === -1) {
            location.replace(location.pathname + "?v=" + PAGE_VERSION + location.hash);
          }
        }
      } catch (ignore) {}
    })();
  </script>
  <div class="page">
    <header class="teacher-header">
      <h1 class="teacher-title">高手揪派｜老師課表</h1>
      <p class="teacher-subtitle">查看每月開課、預約與當日名單</p>
    </header>

    <section id="month-summary" class="month-summary" hidden aria-label="本月統計">
      <div class="summary-grid">
        <div class="summary-item">
          <p class="summary-value" id="stat-classes">0</p>
          <p class="summary-label">本月開課</p>
        </div>
        <div class="summary-item">
          <p class="summary-value" id="stat-completed">0</p>
          <p class="summary-label">已上完</p>
        </div>
        <div class="summary-item">
          <p class="summary-value" id="stat-booked-classes">0</p>
          <p class="summary-label">有人預約</p>
        </div>
        <div class="summary-item">
          <p class="summary-value" id="stat-bookings">0</p>
          <p class="summary-label">預約人次</p>
        </div>
      </div>
    </section>

    <section class="calendar-section" id="calendar-section" hidden aria-label="月曆">
      <div class="month-nav">
        <button id="btn-prev-month" class="month-nav-btn" type="button" aria-label="上個月">‹</button>
        <h2 id="month-label" class="month-label">—</h2>
        <button id="btn-next-month" class="month-nav-btn" type="button" aria-label="下個月">›</button>
      </div>

      <div class="calendar-weekdays" aria-hidden="true">
        <span>一</span>
        <span>二</span>
        <span>三</span>
        <span>四</span>
        <span>五</span>
      </div>

      <div id="calendar-grid" class="calendar-grid"></div>
      <p class="calendar-hint">點選日期查看預約名單</p>
    </section>

    <section class="day-detail" id="day-detail" hidden>
      <h2 class="day-detail-title">當日名單</h2>

      <section class="date-banner" aria-label="查看日期">
        <p class="date-banner-label">查看日期</p>
        <p id="view-date" class="date-banner-value">讀取中…</p>
      </section>

      <div class="toolbar">
        <button id="btn-refresh" class="tool-btn tool-btn-primary" type="button">重新整理</button>
        <button id="btn-today" class="tool-btn" type="button">回到今天</button>
        <button id="btn-copy" class="tool-btn" type="button">複製當日名單</button>
      </div>

      <div id="status-panel" class="status-panel is-loading" role="status" aria-live="polite">
        讀取中，請稍候…
      </div>

      <div id="course-list" class="course-list" hidden></div>
    </section>

    <div id="forbidden-panel" class="forbidden-panel" hidden></div>

    <p class="page-version" id="page-version">介面版本 2026.07.08b</p>
  </div>

  <div id="copy-toast" class="copy-toast" aria-live="polite">已複製到剪貼簿</div>

  <script src="js/config.js?v=202607081400"></script>
  <script src="js/liff-init.js?v=202607081400"></script>
  <script src="js/api.js?v=202607081400"></script>
  <script src="js/line-id-helper.js?v=202607081400"></script>
  <script src="js/teacher.js?v=202607081400"></script>
</body>
</html>
